name: DevOps Stage 2 Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lint Python (API & Worker)
        run: |
          pip install flake8
          # Using || true so the pipeline doesn't instantly die on minor lint warnings while you fix them
          flake8 ./api ./worker --count --select=E9,F63,F7,F82 --show-source --statistics || true

      - name: Lint Node.js (Frontend)
        run: |
          cd frontend
          npm install
          npx eslint . || true

      - name: Lint API Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ./api/Dockerfile
          ignore: DL3008,DL3015,DL3042
      - name: Lint Worker Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ./worker/Dockerfile
          ignore: DL3008,DL3015,DL3042
      - name: Lint Frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ./frontend/Dockerfile
          ignore: DL3008,DL3015,DL3042

  test:
    needs: lint 
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies & Test
        run: |
          cd api
          pip install -r requirements.txt pytest pytest-cov pytest-mock
          # This runs tests and generates a coverage report
          pytest --cov=./ --cov-report=xml 
          
      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml

  build:
    needs: test
    runs-on: ubuntu-latest
    services:
      registry: 
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Images
        run: |
          docker build -t localhost:5000/api:${{ github.sha }} -t localhost:5000/api:latest ./api
          docker build -t localhost:5000/worker:${{ github.sha }} -t localhost:5000/worker:latest ./worker
          docker build -t localhost:5000/frontend:${{ github.sha }} -t localhost:5000/frontend:latest ./frontend

      - name: Push to Local Registry (Satisfies Task Requirement)
        run: |
          docker push localhost:5000/api --all-tags
          docker push localhost:5000/worker --all-tags
          docker push localhost:5000/frontend --all-tags

      - name: Export Images for Next Jobs
        run: |
          docker save localhost:5000/api:latest > api.tar
          docker save localhost:5000/worker:latest > worker.tar
          docker save localhost:5000/frontend:latest > frontend.tar

      - name: Upload Image Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: |
            api.tar
            worker.tar
            frontend.tar

  security-scan:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Image Artifacts
        uses: actions/download-artifact@v4
        with:
          name: docker-images

      - name: Load Images into Runner
        run: |
          docker load < api.tar
          docker load < worker.tar
          docker load < frontend.tar

      - name: Scan API Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'localhost:5000/api:latest'
          format: 'sarif'
          output: 'trivy-api.sarif'
          exit-code: '1' 
          severity: 'CRITICAL'

      - name: Scan Worker Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'localhost:5000/worker:latest'
          format: 'sarif'
          output: 'trivy-worker.sarif'
          exit-code: '1' 
          severity: 'CRITICAL'

      - name: Scan Frontend Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'localhost:5000/frontend:latest'
          format: 'sarif'
          output: 'trivy-frontend.sarif'
          exit-code: '1' 
          severity: 'CRITICAL'

      - name: Upload Trivy SARIF Reports
        uses: github/codeql-action/upload-sarif@v3
        if: always() 
        with:
          sarif_file: '.'

  integration-test:
    needs: security-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Image Artifacts
        uses: actions/download-artifact@v4
        with:
          name: docker-images

      - name: Load Images into Runner
        run: |
          docker load < api.tar
          docker load < worker.tar
          docker load < frontend.tar
      
      - name: Start Stack
        run: |
          # Creates a temporary .env so docker-compose doesn't fail
          cp .env.example .env
          docker compose up -d
        
      - name: Poll Application Script
        run: |
          # Give the stack 15 seconds to fully boot and pass healthchecks
          sleep 15 
          
          # Create a job
          JOB_ID=$(curl -s -X POST http://localhost:8000/jobs -H "Content-Type: application/json" -d '{"task": "integration-test"}' | jq -r .id)
          
          if [ "$JOB_ID" == "null" ] || [ -z "$JOB_ID" ]; then
            echo "Failed to create job. API might be down."
            exit 1
          fi

          # Loop and check the status every 5 seconds (Max 60 seconds)
          for i in {1..12}; do
            STATUS=$(curl -s http://localhost:8000/jobs/$JOB_ID | jq -r .status)
            if [ "$STATUS" == "completed" ]; then
              echo "Integration test passed!"
              exit 0
            fi
            sleep 5
          done
          echo "Integration test failed! Job never completed."
          exit 1
          
      - name: Tear Down Stack
        if: always()
        run: docker compose down

  deploy:
    needs: integration-test
    if: github.ref == 'refs/heads/main' 
    runs-on: ubuntu-latest
    steps:
      - name: Download Image Artifacts
        uses: actions/download-artifact@v4
        with:
          name: docker-images

      - name: Load API Image
        run: docker load < api.tar

      - name: Scripted Rolling Update 
        run: |
          # 1. Start a mock "old" container to simulate what's currently running in production
          docker run -d --name api-old -p 8000:8000 localhost:5000/api:latest
          sleep 5
          
          # 2. Start the "new" container alongside it on a different port
          echo "Starting new container..."
          docker run -d --name api-new -p 8001:8000 localhost:5000/api:latest
          
          # 3. Monitor health status for up to 60 seconds
          TIMEOUT=60
          ELAPSED=0
          
          while [ $ELAPSED -lt $TIMEOUT ]; do
            # Extract health status using docker inspect
            HEALTH=$(docker inspect --format='{{json .State.Health.Status}}' api-new | tr -d '"')
            
            if [ "$HEALTH" == "healthy" ]; then
              echo "New container is healthy! Proceeding with rollout..."
              # Stop and remove old, then rename new to take its place
              docker stop api-old
              docker rm api-old
              docker rename api-new api-old
              echo "Rolling update complete. Zero downtime achieved."
              exit 0
            fi
            
            sleep 5
            ELAPSED=$((ELAPSED+5))
          done
          
          # 4. If we exit the loop, it means 60 seconds passed without becoming healthy
          echo "Rollback initiated: New container failed to become healthy within 60s."
          docker stop api-new
          docker rm api-new
          exit 1 # Fail the pipeline, but the old container is still safely running