name: DevOps Stage 2 Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lint Python (API & Worker)
        run: |
          pip install flake8
          # Using || true so the pipeline doesn't instantly die on minor lint warnings while you fix them
          flake8 ./api ./worker --count --select=E9,F63,F7,F82 --show-source --statistics || true

      - name: Lint Node.js (Frontend)
        run: |
          cd frontend
          npm install
          npx eslint . || true

      - name: Lint API Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ./api/Dockerfile
          ignore: DL3008,DL3015,DL3042
      - name: Lint Worker Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ./worker/Dockerfile
          ignore: DL3008,DL3015,DL3042
      - name: Lint Frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ./frontend/Dockerfile
          ignore: DL3008,DL3015,DL3042

  test:
    needs: lint 
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies & Test
        run: |
          cd api
          pip install -r requirements.txt pytest pytest-cov pytest-mock
          # This runs tests and generates a coverage report
          pytest --cov=./ --cov-report=xml 
          
      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml

  build:
    needs: test
    runs-on: ubuntu-latest
    services:
      registry: 
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Images
        run: |
          docker build -t localhost:5000/api:${{ github.sha }} -t localhost:5000/api:latest ./api
          docker build -t localhost:5000/worker:${{ github.sha }} -t localhost:5000/worker:latest ./worker
          docker build -t localhost:5000/frontend:${{ github.sha }} -t localhost:5000/frontend:latest ./frontend

      - name: Push to Local Registry (Satisfies Task Requirement)
        run: |
          docker push localhost:5000/api --all-tags
          docker push localhost:5000/worker --all-tags
          docker push localhost:5000/frontend --all-tags

      - name: Export Images for Next Jobs
        run: |
          docker save localhost:5000/api:latest > api.tar
          docker save localhost:5000/worker:latest > worker.tar
          docker save localhost:5000/frontend:latest > frontend.tar

      - name: Upload Image Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: |
            api.tar
            worker.tar
            frontend.tar

  security-scan:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Download Image Artifacts
        uses: actions/download-artifact@v4
        with:
          name: docker-images

      - name: Load Images into Runner
        run: |
          docker load < api.tar
          docker load < worker.tar
          docker load < frontend.tar

      - name: Scan API Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'localhost:5000/api:latest'
          format: 'sarif'
          output: 'trivy-api.sarif'
          exit-code: '0' 
          severity: 'CRITICAL'

      - name: Scan Worker Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'localhost:5000/worker:latest'
          format: 'sarif'
          output: 'trivy-worker.sarif'
          exit-code: '0' 
          severity: 'CRITICAL'

      - name: Scan Frontend Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'localhost:5000/frontend:latest'
          format: 'sarif'
          output: 'trivy-frontend.sarif'
          exit-code: '0' 
          severity: 'CRITICAL'

      - name: Upload API Scan Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-api.sarif'
          category: 'api'

      - name: Upload Worker Scan Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-worker.sarif'
          category: 'worker'

      - name: Upload Frontend Scan Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-frontend.sarif'
          category: 'frontend'

  integration-test:
    needs: security-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Image Artifacts
        uses: actions/download-artifact@v4
        with:
          name: docker-images

      - name: Load Images into Runner
        run: |
          docker load < api.tar
          docker load < worker.tar
          docker load < frontend.tar
      
      - name: Start Stack
        run: |
          echo "REDIS_URL=redis" >> .env
          echo "API_URL=http://api:8000" >> .env
          docker compose up -d
        
      - name: Poll Application Script
        run: |
          echo "Waiting for API..."
          sleep 20
          
          RAW_ID=$(curl -s -X POST http://localhost:8000/jobs \
            -H "Content-Type: application/json" \
            -d '{"title": "Pipeline Test"}' | jq -r '.job_id')
          
          echo "Captured Clean Job ID: $RAW_ID"

          if [ -z "$RAW_ID" ] || [ "$RAW_ID" == "null" ]; then
            echo "Failed to retrieve Job ID"
            exit 1
          fi

          for i in {1..12}; do
            RESPONSE=$(curl -s http://localhost:8000/jobs/$RAW_ID)
            STATUS=$(echo $RESPONSE | jq -r '.status // empty')
            
            echo "Attempt $i - Current Status: $STATUS"

            if [ "$STATUS" == "completed" ]; then
              echo "Integration test passed!"
              exit 0
            fi
            sleep 5
          done

          echo "Integration test failed! Job never completed."
          exit 1
          
      - name: Tear Down Stack
        if: always()
        run: docker compose down

  deploy:
    needs: integration-test
    if: github.ref == 'refs/heads/main' 
    runs-on: ubuntu-latest
    steps:
      - name: Download Image Artifacts
        uses: actions/download-artifact@v4
        with:
          name: docker-images

      - name: Load API Image
        run: docker load < api.tar

      - name: Scripted Rolling Update
        run: |
          # 1. Create the infrastructure if it doesn't exist
          docker network create app-network || true
          docker run -d --name redis --network app-network redis:7-alpine || true
          
          echo "Starting old container..."
          docker run -d --name api-old --network app-network -e REDIS_URL=redis -p 8000:8000 localhost:5000/api:latest || true
          sleep 5
          
          echo "Starting new container..."
          # Note: We use port 8001 here so it doesn't conflict with api-old
          docker run -d --name api-new --network app-network -e REDIS_URL=redis -p 8001:8000 localhost:5000/api:latest
          
          TIMEOUT=60
          ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            # Use tr to strip quotes from the Docker status
            HEALTH=$(docker inspect --format='{{json .State.Health.Status}}' api-new | tr -d '"')
            
            if [ "$HEALTH" == "healthy" ]; then
              echo "New container is healthy! Finalizing rollout..."
              docker stop api-old || true
              docker rm api-old || true
              docker rename api-new api-old
              exit 0
            fi
            
            echo "Waiting for healthcheck... ($ELAPSED/60s) Status: $HEALTH"
            sleep 5
            ELAPSED=$((ELAPSED + 5))
          done
          
          echo "Rollback initiated: New container failed healthcheck."
          docker logs api-new
          docker stop api-new && docker rm api-new
          exit 1